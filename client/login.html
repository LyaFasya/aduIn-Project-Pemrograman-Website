<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login AduIn</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box box">
            <h2>Masuk ke AduIn</h2>
            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Masukkan email Anda">
                
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password Anda">
                
                <button type="submit" class="btn btn-blue w-100">Masuk</button>
            </form>
            <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
