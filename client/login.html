<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login aduIn</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div style="text-align: center; margin-bottom: 10px;">
                <span style="font-size: 2rem; font-weight: 800; color: var(--c-navy); letter-spacing: -1px;">aduIn<span style="color: var(--c-teal);">.</span></span>
            </div>
            <h2>Masuk ke Akun Anda</h2>
            <form id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Masukkan email Anda">

                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password Anda">

                <button type="submit" class="btn btn-blue w-100">Masuk</button>
            </form>
            <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
