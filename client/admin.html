<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - AduIn</title>
    <link rel="stylesheet" href="css/admin.styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <div class="logo">AduIn</div>
            <ul class="sidebar-nav">
                <li><a href="javascript:void(0)" onclick="window.location.href='admin.html'" class="active">Dashboard</a></li>
                <li><a href="#" data-selection="kategori">Tambah Kategori</a></li>
            </ul>
            <div class="logout-section">
                <a href="#" id="linkProfile" style="color: #3498db;">Profil</a>
                <a href="#" id="btnLogout" style="margin-top: 10px; color: #e74c3c;">Keluar</a>
            </div>
        </div>

        <!-- Content -->
        <div id="sectionDashboard" class="section active">
            <div class="admin-content">
                <div class="admin-header">
                    <h1 id="adminName">Nama Admin</h1>
                </div>

                <div class="dashboard-grid" id="containerLaporan">
                    <div class="no-data">
                        <p>Memuat data laporan...</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="sectionKategori" class="section">
            <div class="admin-content">
                <div class="admin-header">
                    <h1>Tambah Kategori</h1>
                </div>

    <div class="table-responsive" style="padding:20px;">
        <form id="formKategori">

            <label>Nama Kategori</label>
            <input 
                type="text" 
                id="categoryName" 
                placeholder="Contoh: Drainase"
                required
            >

            <button type="submit" class="btn btn-blue">
                Tambah Kategori
            </button>

        </form>

        <hr style="margin:20px 0;">

        <div id="containerKategori"></div>

    </div>
</div>
</div>
</div>

    <!-- Modal Detail -->
    <div id="modalDetail" class="modal-detail">
        <div class="modal-detail-content">
            <div class="detail-header">
                <h2 id="detailTitle">Detail</h2>
                <span class="close-btn" id="closeModalDetail" style="margin: 0; cursor: pointer;">&times;</span>
            </div>
            <div id="detailContent">
                <!-- Konten detail akan diisi dengan JavaScript -->
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
